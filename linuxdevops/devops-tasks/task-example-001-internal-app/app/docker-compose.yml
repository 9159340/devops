services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: messages
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d messages"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    image: ${REGISTRY:-localhost:5000}/internal-messages-backend:${TAG:-latest}
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/messages
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ${REGISTRY:-localhost:5000}/internal-messages-frontend:${TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
