<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New message — Internal Messages</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header id="site-header"></header>
    <main>
      <div class="card">
        <h1>Send a message</h1>
        <form id="compose-form">
          <label for="text">Message</label>
          <textarea id="text" name="text" required maxlength="4000" placeholder="Write your message…"></textarea>
          <button type="submit">Submit</button>
        </form>
        <p id="ok" class="ok" hidden></p>
        <p id="error" class="error" hidden></p>
      </div>
    </main>
    <script src="/app.js"></script>
    <script>
      if (!requireAuth()) {
        /* redirecting */
      } else {
        renderHeader("compose");

        document.getElementById("compose-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const error = document.getElementById("error");
          const ok = document.getElementById("ok");
          error.hidden = true;
          ok.hidden = true;
          const text = document.getElementById("text").value.trim();
          try {
            await api("/api/messages", {
              method: "POST",
              body: JSON.stringify({ text }),
            });
            document.getElementById("text").value = "";
            ok.textContent = "Message saved.";
            ok.hidden = false;
          } catch (err) {
            if (err.status === 401) {
              clearSession();
              window.location.href = "/login.html";
              return;
            }
            error.textContent = err.message;
            error.hidden = false;
          }
        });
      }
    </script>
  </body>
</html>
